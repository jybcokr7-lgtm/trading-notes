<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이딩 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap');

  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --border:#2a2f45;--border2:#353b55;
    --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
    --accent:#4f8ef7;--accent-dim:#1a2a4a;
    --green:#2dd4a0;--green-dim:#0d2e22;
    --purple:#a78bfa;--purple-dim:#1e1535;
    --amber:#f59e0b;--amber-dim:#2a1e06;
    --red:#f87171;--red-dim:#2a0f0f;
    --radius:10px;--radius-lg:14px;
  }
  .light {
    --bg:#f4f6fb;--surface:#fff;--surface2:#f1f3f8;
    --border:#e2e6f0;--border2:#c8cfe0;
    --text:#1a1d2e;--text2:#5a6080;--text3:#9aa0b8;
    --accent:#2563eb;--accent-dim:#dbeafe;
    --green:#059669;--green-dim:#d1fae5;
    --purple:#7c3aed;--purple-dim:#ede9fe;
    --amber:#d97706;--amber-dim:#fef3c7;
    --red:#dc2626;--red-dim:#fee2e2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:background 0.2s,color 0.2s}
  body.dark::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;pointer-events:none;z-index:0}

  .app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 3rem}

  /* 로그인 화면 */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;text-align:center}
  .login-logo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px}
  .login-title{font-size:20px;font-weight:600;margin-bottom:6px}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
  .login-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:14px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;text-align:center;letter-spacing:0.1em;margin-bottom:10px;transition:border-color 0.15s}
  .login-input:focus{border-color:var(--accent)}
  .login-btn{width:100%;padding:10px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:14px;font-family:'Pretendard',sans-serif;font-weight:500;cursor:pointer;transition:opacity 0.15s}
  .login-btn:hover{opacity:0.88}
  .login-err{font-size:12px;color:var(--red);margin-top:6px;min-height:18px}
  .readonly-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:8px;font-size:12px;padding:8px;border-radius:var(--radius);width:100%;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.15s}
  .readonly-btn:hover{color:var(--text);border-color:var(--border)}

  /* 헤더 */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:3px}
  .title{font-size:22px;font-weight:600;letter-spacing:-0.02em}
  .header-right{display:flex;align-items:center;gap:12px}
  .stats{display:flex;gap:16px}
  .stat{text-align:right}
  .stat-num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;color:var(--accent);line-height:1}
  .stat-label{font-size:11px;color:var(--text3);margin-top:2px}
  .icon-round{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .icon-round:hover{border-color:var(--accent)}
  .readonly-badge{font-size:11px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace}

  /* 연결상태 */
  .conn-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.2rem;font-size:12px;color:var(--text2)}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s}
  .conn-dot.ok{background:var(--green)}
  .conn-dot.err{background:var(--red)}

  /* 2단 레이아웃 */
  .layout{display:grid;grid-template-columns:380px 1fr;gap:1.2rem;align-items:start}
  .left-panel{display:flex;flex-direction:column;gap:1rem;position:sticky;top:1.5rem}

  /* 카드 공통 */
  .panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}

  /* 입력 */
  .source-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .src-btn{padding:3px 10px;border-radius:20px;font-size:11px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
  .src-btn:hover{border-color:var(--accent);color:var(--accent)}
  .src-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);resize:vertical;min-height:90px;outline:none;transition:border-color 0.15s;line-height:1.6}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--text3);font-size:12px}

  /* 카테고리 수동 선택 */
  .cat-select-row{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
  .cat-select-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
  .cat-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;cursor:pointer;flex:1}
  .cat-select:focus{border-color:var(--accent)}

  /* 이미지 */
  .img-area{margin-top:8px;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:all 0.15s;position:relative}
  .img-area:hover,.img-area.dragover{border-color:var(--accent);background:var(--accent-dim)}
  .img-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .img-area-label{font-size:11px;color:var(--text3);pointer-events:none}
  .img-area-label .hl{color:var(--accent)}
  .img-preview-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .img-preview-item{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--border2)}
  .img-preview-item img{width:100%;height:100%;object-fit:cover}
  .img-remove{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,0.75);color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}

  /* 자동 태그 */
  .auto-tags{min-height:28px;display:flex;gap:5px;flex-wrap:wrap;margin:8px 0;align-items:center}
  .at-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:opacity 0.15s}
  .tag:hover{opacity:0.75}
  .tag-ticker{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
  .tag-keyword{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple)}
  .tag-category{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
  .tag-source{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}

  .save-row{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
  .btn{padding:7px 16px;border-radius:var(--radius);font-size:12px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
  .btn:hover{background:var(--surface2);color:var(--text)}
  .btn-save{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
  .btn-save:hover{opacity:0.88}
  .btn-save:disabled{opacity:0.5;cursor:not-allowed}

  /* 검색 */
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--text3)}
  .date-filters{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .date-btn{padding:3px 10px;border-radius:20px;font-size:11px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
  .date-btn:hover{border-color:var(--amber);color:var(--amber)}
  .date-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
  .filter-clear{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'Pretendard',sans-serif;padding:0;margin-top:6px;display:block}
  .filter-clear:hover{color:var(--accent)}

  /* 카테고리 관리 */
  .cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cat-edit-btn{font-size:11px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Pretendard',sans-serif;padding:0}
  .cat-list{display:flex;flex-direction:column;gap:6px}
  .cat-item{background:var(--surface2);border-radius:var(--radius);padding:8px 10px}
  .cat-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
  .cat-name{font-size:12px;font-weight:500;color:var(--amber)}
  .cat-del{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;opacity:0.5}
  .cat-del:hover{opacity:1;color:var(--red)}
  .cat-keywords{font-size:11px;color:var(--text3);line-height:1.5}
  .cat-edit-area{display:none;flex-direction:column;gap:6px;margin-top:8px}
  .cat-edit-area.open{display:flex}
  .cat-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none}
  .cat-input:focus{border-color:var(--accent)}
  .btn-xs{padding:5px 10px;border-radius:6px;font-size:11px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
  .btn-xs:hover{background:var(--surface2)}
  .btn-xs.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* 탭 */
  .cat-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--border);overflow-x:auto}
  .cat-tab{padding:8px 16px;font-size:13px;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
  .cat-tab:hover{color:var(--text)}
  .cat-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
  .tab-count{font-size:10px;background:var(--surface2);border-radius:10px;padding:1px 6px;margin-left:4px;color:var(--text3)}
  .cat-tab.active .tab-count{background:var(--accent-dim);color:var(--accent)}

  /* 노트 목록 */
  .notes-list{display:flex;flex-direction:column;gap:8px}
  .date-group-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
  .note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.9rem 1.1rem;transition:border-color 0.15s;cursor:pointer}
  .note-card:hover{border-color:var(--accent)}
  .note-preview{font-size:13px;color:var(--text);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;white-space:normal;word-break:break-word}
  .note-thumb-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .note-thumb-small{width:60px;height:48px;border-radius:6px;overflow:hidden;border:1px solid var(--border2);flex-shrink:0}
  .note-thumb-small img{width:100%;height:100%;object-fit:cover}
  .note-footer{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .note-date{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-left:auto}
  .empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:13px;line-height:2}

  /* 노트 상세 팝업 */
  .detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;align-items:center;justify-content:center;padding:0.75rem}
  .detail-overlay.open{display:flex}
  .detail-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:1300px;height:95vh;overflow:hidden;display:flex;flex-direction:column}
  .detail-modal.text-only{height:auto;max-height:85vh;max-width:680px}
  .detail-header{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0}
  .detail-title{font-size:14px;font-weight:500;color:var(--text2)}
  .detail-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px;opacity:0.6}
  .detail-close:hover{opacity:1;color:var(--red)}
  .detail-body{display:flex;flex:1;overflow:hidden;min-height:0}
  .detail-left{padding:1.25rem;overflow-y:auto;border-right:1px solid var(--border);flex-shrink:0;min-width:200px;max-width:80%}
  .detail-left.full{flex:1;border-right:none;max-width:100%;overflow-y:auto}
  .detail-right{position:relative;overflow:hidden;background:#0a0d14;display:flex;align-items:center;justify-content:center;flex:1;min-width:200px}
  .resizer{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background 0.15s;position:relative;z-index:5}
  .resizer:hover,.resizer.dragging{background:var(--accent)}
  .resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:30px;border-radius:2px;background:var(--border2)}
  .resizer:hover::after,.resizer.dragging::after{background:var(--accent)}
  .detail-text{font-size:14px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-word}
  .detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .detail-actions{display:flex;gap:6px;padding:0.8rem 1.25rem;border-top:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
  .img-viewer{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:1rem}
  .img-viewer img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius);cursor:zoom-in;transition:opacity 0.15s}
  .img-viewer img:hover{opacity:0.9}
  .img-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:10}
  .img-nav:hover{background:rgba(0,0,0,0.9)}
  .img-nav.prev{left:12px}
  .img-nav.next{right:12px}
  .img-counter{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.8);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:4px 12px;border-radius:20px;white-space:nowrap}
  .no-img{color:var(--text3);font-size:13px}

  /* 편집 모드 (팝업 내) */
  .edit-source-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
  .edit-cat-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
  .edit-cat-sel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;flex:1}
  .edit-textarea{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:var(--radius);padding:10px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);resize:vertical;min-height:200px;outline:none;line-height:1.6}

  /* 라이트박스 */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;align-items:center;justify-content:center;cursor:pointer}
  .lightbox.open{display:flex}
  .lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--radius)}
  .lightbox-close{position:absolute;top:20px;right:24px;color:white;font-size:26px;cursor:pointer;opacity:0.6}
  .lightbox-close:hover{opacity:1}

  .paste-hint{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:var(--radius);background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);font-size:12px;font-family:'Pretendard',sans-serif;z-index:999;display:none;white-space:nowrap}
  .paste-hint.show{display:block}
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius);font-size:13px;font-family:'Pretendard',sans-serif;z-index:999;display:none;white-space:nowrap}
  .toast.ok{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
  .toast.err{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}

  @media(max-width:900px){.layout{grid-template-columns:1fr}.left-panel{position:static}.detail-body{grid-template-columns:1fr}.detail-modal{height:98vh}.detail-left{max-height:40vh}.detail-right{max-height:50vh}}
  @media(max-width:600px){.app{padding:1rem 1rem 3rem}}
</style>
</head>
<body class="dark">
<div class="paste-hint" id="pasteHint">이미지가 추가됐어요!</div>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Trading Notes</div>
    <div class="login-title">트레이딩 노트</div>
    <div class="login-sub">비밀번호를 입력하면 저장·수정이 가능해요</div>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
    <button class="readonly-btn" onclick="enterReadonly()">읽기 전용으로 보기</button>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <div>
      <div class="logo">Trading Notes</div>
      <div class="title">트레이딩 노트</div>
    </div>
    <div class="header-right">
      <span class="readonly-badge" id="readonlyBadge" style="display:none">읽기 전용</span>
      <button class="icon-round" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <button class="icon-round" id="lockBtn" onclick="logout()" title="로그아웃" style="display:none">🔒</button>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="totalCount">-</div><div class="stat-label">총 노트</div></div>
        <div class="stat"><div class="stat-num" id="tickerCount">-</div><div class="stat-label">티커</div></div>
      </div>
    </div>
  </div>

  <div class="conn-bar">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">Supabase 연결 중...</span>
  </div>

  <div class="layout">
    <!-- 왼쪽 -->
    <div class="left-panel">

// 간단 해시 (MD5 대체)
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
}

function tryLogin(){
  const pw=document.getElementById('pwInput').value;
  hashPw(pw).then(h=>{

      isLoggedIn=true;isReadonly=false;
      sessionStorage.setItem('tn_auth','1');
      startApp();
    } else {
      document.getElementById('loginErr').textContent='비밀번호가 틀렸습니다.';
      document.getElementById('pwInput').value='';
    }
  });
}

async function api(method,path,body){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{method,headers:H,body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}
async function uploadImage(file){
  const ext=(file.name||'img.png').split('.').pop();
  const path=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type||'image/png'},body:file});
  if(!res.ok)throw new Error('이미지 업로드 실패');
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

}

function detectCategory(keywords){
  const kw=keywords.map(k=>k.text.toLowerCase());
  for(const cat of categories){if(cat.keywords.some(ck=>kw.includes(ck.toLowerCase())))return cat.name;}
  return null;
}

function autoDetect(){
  const text=document.getElementById('noteInput').value;
  detectedTags=[];
  const tickerSet=new Set();
  (text.match(/\$[A-Z]{1,6}/g)||[]).forEach(t=>tickerSet.add(t));
  (text.match(/\b[A-Z]{2,6}(?:\/[A-Z]{2,6})?\b/g)||[]).filter(t=>!SKIP.has(t)&&t.length>=2).forEach(t=>tickerSet.add(t));
  [...tickerSet].slice(0,8).forEach(t=>detectedTags.push({text:t,type:'ticker'}));
  categories.flatMap(c=>c.keywords).forEach(kw=>{if(text.toLowerCase().includes(kw.toLowerCase()))detectedTags.push({text:kw,type:'keyword'});});
  const autoCat=detectCategory(detectedTags.filter(t=>t.type==='keyword'));
  if(autoCat){detectedTags.push({text:autoCat,type:'category'});}
  const c=document.getElementById('autoTags');
  if(!detectedTags.length){c.innerHTML='<span class="at-label">// 자동 감지 대기중</span>';return;}
  c.innerHTML='<span class="at-label">// 감지됨</span>'+detectedTags.map(t=>`<span class="tag tag-${t.type}">${esc(t.text)}</span>`).join('');
}

async function saveNote(){
  if(!isLoggedIn)return;
  const text=document.getElementById('noteInput').value.trim();
  if(!text&&pendingImages.length===0)return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent=pendingImages.length>0?'이미지 업로드 중...':'저장 중...';
  try{
    const imageUrls=[];
    for(const item of pendingImages){imageUrls.push(await uploadImage(item.file));}
    btn.textContent='저장 중...';
    // 수동 카테고리 우선
    const manualCat=document.getElementById('manualCat').value;
    let finalTags=[...detectedTags.filter(t=>t.type!=='category')];
    if(manualCat)finalTags.push({text:manualCat,type:'category'});
    else{const autoCat=detectCategory(finalTags.filter(t=>t.type==='keyword'));if(autoCat)finalTags.push({text:autoCat,type:'category'});}
    const note={id:Date.now(),text,source:selectedSource,tags:finalTags,images:imageUrls,date:new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
    await api('POST','notes',note);
    notes.unshift(note);clearInput();applyFilters();updateStats();renderCatTabs();
    toast('저장했습니다!',false);
  }catch(e){toast('저장 실패: '+e.message,true);}
  btn.disabled=false;btn.textContent='저장하기';
}

async function deleteNote(id){

    await api('DELETE',`notes?id=eq.${id}`);

async function saveEdit(id){

  const source=document.getElementById(`es-${id}`)?.value;

    await api('PATCH',`notes?id=eq.${id}`,{text,source,tags});
    const note=notes.find(n=>n.id===id);
    if(note){note.text=text;note.source=source;note.tags=tags;}
    editingId=null;openDetail(id);applyFilters();

function setDateFilter(btn,val){document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');dateFilter=val;applyFilters();renderCatTabs();}
function clearAllFilters(){document.getElementById('searchInput').value='';dateFilter='all';document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.date-btn').classList.add('active');applyFilters();renderCatTabs();}

function getFilteredBase(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const now=new Date();
  return notes.filter(n=>{
    if(dateFilter!=='all'){const ts=n.ts||n.id;const d=new Date(ts);
      if(dateFilter==='today'&&d.toDateString()!==now.toDateString())return false;
      if(dateFilter==='week'){const w=new Date(now);w.setDate(now.getDate()-7);if(d<w)return false;}
      if(dateFilter==='month'&&(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()))return false;
    }
    if(q&&!(n.text||'').toLowerCase().includes(q)&&!(n.tags||[]).some(t=>t.text.toLowerCase().includes(q))&&!(n.source||'').toLowerCase().includes(q))return false;
    return true;
  });
}

function getFiltered(){
  const base=getFilteredBase();
  if(activeTab==='all')return base;
  if(activeTab==='etc')return base.filter(n=>!(n.tags||[]).some(t=>t.type==='category'));
  const cat=categories.find(c=>c.id===activeTab);
  if(!cat)return base;
  return base.filter(n=>(n.tags||[]).some(t=>t.type==='category'&&t.text===cat.name));
}

  const now=new Date();const groups={};

    if(!groups[label])groups[label]=[];groups[label].push(n);
  });
  const now2=new Date();
  el.innerHTML=Object.entries(groups).map(([label,gNotes])=>`
    <div class="date-group-label">${label} · ${gNotes.length}개</div>
    ${gNotes.map(n=>`
      <div class="note-card" onclick="openDetail(${n.id})">
        <div class="note-preview">${n.text?linkify(n.text):'<span style="color:var(--text3);font-size:12px">텍스트 없음</span>'}</div>
        ${(n.images||[]).length?`<div class="note-thumb-row">${n.images.slice(0,3).map(url=>`<div class="note-thumb-small"><img src="${url}" alt="차트"></div>`).join('')}${n.images.length>3?`<div class="note-thumb-small" style="align-items:center;justify-content:center;display:flex;background:var(--surface2);color:var(--text3);font-size:11px">+${n.images.length-3}</div>`:''}</div>`:''}
        <div class="note-footer">
          <span class="tag tag-source" style="font-size:10px">${esc(n.source)}</span>
          ${(n.tags||[]).filter(t=>t.type==='category').map(t=>`<span class="tag tag-category" style="font-size:10px">${esc(t.text)}</span>`).join('')}
          ${(n.tags||[]).filter(t=>t.type==='ticker').map(t=>`<span class="tag tag-ticker" style="font-size:10px">${esc(t.text)}</span>`).join('')}
          <span class="note-date">${n.date}</span>
        </div>
      </div>`).join('')}`).join('');
}

// 노트 상세 팝업
function openDetail(id){
  openedNoteId=id;
  currentImgIndex=0;
  const n=notes.find(n=>n.id===id);if(!n)return;
  const isEditing=editingId===id;
  const overlay=document.getElementById('detailOverlay');
  document.getElementById('detailTitle').textContent=n.date;

  // 왼쪽: 텍스트
  let leftHtml='';
  if(isEditing&&isLoggedIn){
    leftHtml=`
      <div class="edit-source-row">
        ${SOURCES.map(s=>`<button class="src-btn ${n.source===s?'active':''}" onclick="this.parentNode.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('es-${id}').value='${s}'">${s}</button>`).join('')}
        <input type="hidden" id="es-${id}" value="${esc(n.source)}">
      </div>
      <div class="edit-cat-row">
        <span class="at-label">카테고리</span>
        <select class="edit-cat-sel" id="ec-${id}">
          <option value="">없음</option>
          ${categories.map(c=>`<option value="${esc(c.name)}" ${(n.tags||[]).some(t=>t.type==='category'&&t.text===c.name)?'selected':''}>${esc(c.name)}</option>`).join('')}
          <option value="기타" ${(n.tags||[]).some(t=>t.type==='category'&&t.text==='기타')?'selected':''}>기타</option>
        </select>
      </div>
      <textarea class="edit-textarea" id="et-${id}">${esc(n.text||'')}</textarea>`;
  } else {
    leftHtml=`<div class="detail-text">${n.text?linkify(n.text):'<span style="color:var(--text3)">텍스트 없음</span>'}</div>
      <div class="detail-tags">
        <span class="tag tag-source">${esc(n.source)}</span>
        ${(n.tags||[]).filter(t=>t.type==='category').map(t=>`<span class="tag tag-category">${esc(t.text)}</span>`).join('')}
        ${(n.tags||[]).filter(t=>t.type==='ticker').map(t=>`<span class="tag tag-ticker">${esc(t.text)}</span>`).join('')}
        ${(n.tags||[]).filter(t=>t.type==='keyword').map(t=>`<span class="tag tag-keyword">${esc(t.text)}</span>`).join('')}
      </div>`;
  }

  // 이미지 유무에 따라 레이아웃 결정
  const imgs = n.images || [];
  const hasImgs = imgs.length > 0;

  // 모달 크기 조정
  const modal = document.getElementById('detailModal');
  modal.className = hasImgs ? 'detail-modal' : 'detail-modal text-only';

  let rightHtml = '';
  if(hasImgs){
    rightHtml = `<div class="img-viewer" id="imgViewer">
      <img id="viewerImg" src="${imgs[0]}" alt="차트" onclick="openLightbox(currentImgUrl())">
      ${imgs.length>1?`<button class="img-nav prev" onclick="changeImg(-1)">‹</button><button class="img-nav next" onclick="changeImg(1)">›</button>`:''}
      ${imgs.length>1?`<div class="img-counter" id="imgCounter">1 / ${imgs.length}</div>`:''}
    </div>`;
  }

  document.getElementById('detailBody').innerHTML = hasImgs
    ? `<div class="detail-left" id="detailLeft" style="width:420px">${leftHtml}</div>
       <div class="resizer" id="resizer"></div>
       <div class="detail-right">${rightHtml}</div>`
    : `<div class="detail-left full">${leftHtml}</div>`;

  // 리사이저 드래그
  if(hasImgs) initResizer();

  // 액션 버튼
  let actions='';
  if(isLoggedIn){
    if(isEditing){
      actions=`<button class="btn" onclick="editingId=null;openDetail(${id})">취소</button><button class="btn btn-save" onclick="saveEdit(${id})">저장</button>`;
    } else {
      actions=`<button class="btn" onclick="editingId=${id};openDetail(${id})">✎ 편집</button><button class="btn" style="color:var(--red)" onclick="deleteNote(${id})">삭제</button>`;
    }
  }
  document.getElementById('detailActions').innerHTML=actions;
  overlay.classList.add('open');
}

function closeDetail(){editingId=null;openedNoteId=null;document.getElementById('detailOverlay').classList.remove('open');}
function closeDetailOutside(e){if(e.target===document.getElementById('detailOverlay'))closeDetail();}

function updateStats(){
  document.getElementById('totalCount').textContent=notes.length;
  const tickers=new Set(notes.flatMap(n=>(n.tags||[]).filter(t=>t.type==='ticker').map(t=>t.text)));
  document.getElementById('tickerCount').textContent=tickers.size;
}

function initResizer(){
  const resizer=document.getElementById('resizer');
  const left=document.getElementById('detailLeft');
  const body=document.getElementById('detailBody');
  if(!resizer||!left||!body)return;
  let startX,startW;
  resizer.addEventListener('mousedown',e=>{
    startX=e.clientX;startW=left.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    const onMove=e=>{
      const dx=e.clientX-startX;
      const bodyW=body.offsetWidth;
      const newW=Math.min(Math.max(startW+dx,200),bodyW-200);
      left.style.width=newW+'px';
    };
    const onUp=()=>{
      resizer.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

let currentImgIndex=0;
function changeImg(dir) {
  const n = notes.find(n => n.id === openedNoteId);
  if(!n || !n.images) return;
  currentImgIndex = (currentImgIndex + dir + n.images.length) % n.images.length;
  document.getElementById('viewerImg').src = n.images[currentImgIndex];
  const counter = document.getElementById('imgCounter');
  if(counter) counter.textContent = `${currentImgIndex + 1} / ${n.images.length}`;
}
function currentImgUrl() {
  const n = notes.find(n => n.id === openedNoteId);
  return n?.images?.[currentImgIndex] || '';
}

function openLightbox(url){document.getElementById('lightboxImg').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeDetail();}});

function linkify(text){
  const urlRegex=/(https?:\/\/[^\s"<>]+)/g;const parts=[];let last=0,match;
  while((match=urlRegex.exec(text))!==null){
    if(match.index>last)parts.push(esc(text.slice(last,match.index)));
    const url=match[1];parts.push(`<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;word-break:break-all;" onclick="event.stopPropagation()">${esc(url)}</a>`);
    last=match.index+url.length;
  }
  if(last<text.length)parts.push(esc(text.slice(last)));return parts.join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,isErr){const el=document.getElementById('toast');el.className='toast '+(isErr?'err':'ok');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',3000);}

// 초기화
const savedTheme=localStorage.getItem('theme');
if(savedTheme==='light'){isDark=false;document.body.className='light';document.getElementById('themeBtn').textContent='☀️';}
if(sessionStorage.getItem('tn_auth')==='1'){isLoggedIn=true;startApp();}
</script>
