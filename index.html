<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이딩 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2a2f45;
    --border2: #353b55;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555a72;
    --accent: #4f8ef7;
    --accent-dim: #1a2a4a;
    --green: #2dd4a0;
    --green-dim: #0d2e22;
    --purple: #a78bfa;
    --purple-dim: #1e1535;
    --red: #f87171;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .title { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .stats { display: flex; gap: 16px; }
  .stat { text-align: right; }
  .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .conn-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.2rem;
    font-size: 12px;
    color: var(--text2);
  }
  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .conn-dot.ok { background: var(--green); }
  .conn-dot.err { background: var(--red); }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.2rem;
  }
  .source-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .src-label { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
  .src-btn {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
  }
  .src-btn:hover { border-color: var(--accent); color: var(--accent); }
  .src-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 14px;
    font-family: 'Pretendard', sans-serif;
    color: var(--text);
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  .auto-tags {
    min-height: 32px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 10px 0;
    align-items: center;
  }
  .at-label { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .tag:hover { opacity: 0.75; }
  .tag-ticker { background: var(--accent-dim); color: var(--accent); border: 1px solid #2a3d6a; }
  .tag-keyword { background: var(--purple-dim); color: var(--purple); border: 1px solid #2d2050; }
  .tag-source { background: var(--green-dim); color: var(--green); border: 1px solid #0d3525; }

  .save-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
  .btn-save:hover { background: #6fa3ff; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  input[type=text] {
    flex: 1;
    min-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--text3); }
  .filter-clear {
    padding: 7px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
  }
  .filter-clear:hover { color: var(--text); border-color: var(--border2); }

  .notes-list { display: flex; flex-direction: column; gap: 10px; }
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    transition: border-color 0.15s;
  }
  .note-card:hover { border-color: var(--border2); }
  .note-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .note-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .del-btn {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.5;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { opacity: 1; color: var(--red); }
  .note-footer { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .note-date { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-left: auto; }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 14px; line-height: 2; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    z-index: 999;
    display: none;
    white-space: nowrap;
  }
  .toast.ok { background: var(--green-dim); color: var(--green); border: 1px solid #0d3525; }
  .toast.err { background: #2a0f0f; color: var(--red); border: 1px solid #3d1515; }
  .hidden { display: none; }

  @media(max-width: 600px) {
    .app { padding: 1rem 1rem 3rem; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="logo">Trading Notes</div>
      <div class="title">트레이딩 노트</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">-</div>
        <div class="stat-label">총 노트</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="tickerCount">-</div>
        <div class="stat-label">티커</div>
      </div>
    </div>
  </div>

  <div class="conn-bar">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">Supabase 연결 중...</span>
  </div>

  <div class="input-card">
    <div class="source-row">
      <span class="src-label">출처</span>
      <button class="src-btn active" onclick="selectSource(this,'Discord')">Discord</button>
      <button class="src-btn" onclick="selectSource(this,'Telegram')">Telegram</button>
      <button class="src-btn" onclick="selectSource(this,'Twitter/X')">Twitter/X</button>
      <button class="src-btn" onclick="selectSource(this,'기타')">기타</button>
    </div>
    <textarea id="noteInput"
      placeholder="저장하고 싶은 트레이딩 대화를 붙여넣으세요...&#10;티커($BTC, AAPL), 키워드(매수, 저항선, RSI 등)를 자동으로 감지합니다."
      oninput="autoDetect()"></textarea>
    <div class="auto-tags" id="autoTags">
      <span class="at-label">// 태그 자동 감지</span>
    </div>
    <div class="save-row">
      <button class="btn" onclick="clearInput()">초기화</button>
      <button class="btn btn-save" id="saveBtn" onclick="saveNote()">저장하기</button>
    </div>
  </div>

  <div class="filter-row">
    <span class="filter-label">검색</span>
    <input type="text" id="searchInput" placeholder="티커, 키워드, 본문 검색..." oninput="renderNotes()">
    <button class="filter-clear" onclick="clearFilter()">전체보기</button>
  </div>

  <div id="notesList" class="notes-list">
    <div class="empty">불러오는 중...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://tewwzcohejmnkztwilzl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRld3d6Y29oZWptbmt6dHdpbHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjQ2NzksImV4cCI6MjA5MTkwMDY3OX0.8r6FZecsg-wTgGCbOkLTkpZVZZmfiKwEzaNHO6bEj8w';
const H = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

const KEYWORDS = [
  '매수','매도','롱','숏','지지','저항','목표가','손절','익절','돌파','눌림',
  '반등','하락','상승','오버나잇','스윙','데이트레이딩','단타','중장기','추세',
  '이평선','골든크로스','데드크로스','볼린저','RSI','MACD','거래량','변동성',
  '포지션','레버리지','선물','현물','코인','주식','ETF','옵션','차트','패턴',
  '눌림목','피보나치','지지선','저항선','breakout','long','short','buy','sell','hold',
  '비중','분할매수','분할매도','물타기','불타기','횡보','박스권','급등','급락'
];
const SKIP = new Set(['I','A','AM','PM','THE','AND','FOR','ARE','YOU','IT','IS','IN','ON','AT','TO','BE','DO','IF','OR','OF','WE','AS','BY','AN','SO','UP','NO','GO']);

let notes = [];
let selectedSource = 'Discord';
let detectedTags = [];

async function api(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: H,
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function load() {
  try {
    notes = await api('GET', 'notes?order=id.desc') || [];
    setConn(true);
    renderNotes();
    updateStats();
  } catch(e) {
    setConn(false);
    document.getElementById('notesList').innerHTML =
      '<div class="empty">Supabase 연결 실패.<br>인터넷 연결을 확인해주세요.</div>';
  }
}

function setConn(ok) {
  document.getElementById('connDot').className = 'conn-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('connText').textContent = ok
    ? 'Supabase 연결됨 — 집·회사·모바일 어디서든 실시간 동기화'
    : '연결 실패 — 인터넷을 확인해주세요';
}

function selectSource(btn, src) {
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSource = src;
}

function autoDetect() {
  const text = document.getElementById('noteInput').value;
  detectedTags = [];
  const tickerSet = new Set();
  (text.match(/\$[A-Z]{1,6}/g)||[]).forEach(t => tickerSet.add(t));
  (text.match(/\b[A-Z]{2,6}(?:\/[A-Z]{2,6})?\b/g)||[])
    .filter(t => !SKIP.has(t) && t.length >= 2)
    .forEach(t => tickerSet.add(t));
  [...tickerSet].slice(0,10).forEach(t => detectedTags.push({text:t, type:'ticker'}));
  KEYWORDS.forEach(kw => {
    if(text.toLowerCase().includes(kw.toLowerCase()))
      detectedTags.push({text:kw, type:'keyword'});
  });
  const c = document.getElementById('autoTags');
  if(!detectedTags.length) {
    c.innerHTML = '<span class="at-label">// 태그 자동 감지</span>';
    return;
  }
  c.innerHTML = '<span class="at-label">// 감지됨</span>' +
    detectedTags.map(t => `<span class="tag tag-${t.type}">${esc(t.text)}</span>`).join('');
}

async function saveNote() {
  const text = document.getElementById('noteInput').value.trim();
  if(!text) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const note = {
      id: Date.now(),
      text,
      source: selectedSource,
      tags: detectedTags,
      date: new Date().toLocaleDateString('ko-KR', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
    };
    await api('POST', 'notes', note);
    notes.unshift(note);
    clearInput();
    renderNotes();
    updateStats();
    toast('저장했습니다!', false);
  } catch(e) {
    toast('저장 실패. 연결을 확인해주세요.', true);
  }
  btn.disabled = false;
  btn.textContent = '저장하기';
}

async function deleteNote(id) {
  if(!confirm('이 노트를 삭제할까요?')) return;
  try {
    await api('DELETE', `notes?id=eq.${id}`);
    notes = notes.filter(n => n.id !== id);
    renderNotes();
    updateStats();
    toast('삭제했습니다.', false);
  } catch(e) {
    toast('삭제 실패.', true);
  }
}

function clearInput() {
  document.getElementById('noteInput').value = '';
  detectedTags = [];
  document.getElementById('autoTags').innerHTML = '<span class="at-label">// 태그 자동 감지</span>';
}

function clearFilter() {
  document.getElementById('searchInput').value = '';
  renderNotes();
}

function filterByTag(text) {
  document.getElementById('searchInput').value = text;
  renderNotes();
}

function renderNotes() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = q
    ? notes.filter(n =>
        n.text.toLowerCase().includes(q) ||
        (n.tags||[]).some(t => t.text.toLowerCase().includes(q)) ||
        n.source.toLowerCase().includes(q))
    : notes;
  const el = document.getElementById('notesList');
  if(!filtered.length) {
    el.innerHTML = `<div class="empty">${notes.length
      ? '검색 결과가 없습니다.'
      : '아직 저장된 노트가 없습니다.<br>위에서 대화를 붙여넣고 저장해보세요!'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="note-card">
      <div class="note-top">
        <div class="note-text">${esc(n.text.length>400 ? n.text.slice(0,400)+'...' : n.text)}</div>
        <button class="del-btn" onclick="deleteNote(${n.id})">✕</button>
      </div>
      <div class="note-footer">
        <span class="tag tag-source" onclick="filterByTag('${esc(n.source)}')">${esc(n.source)}</span>
        ${(n.tags||[]).map(t=>`<span class="tag tag-${t.type}" onclick="filterByTag('${esc(t.text)}')">${esc(t.text)}</span>`).join('')}
        <span class="note-date">${n.date}</span>
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('totalCount').textContent = notes.length;
  const tickers = new Set(notes.flatMap(n=>(n.tags||[]).filter(t=>t.type==='ticker').map(t=>t.text)));
  document.getElementById('tickerCount').textContent = tickers.size;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.className = 'toast ' + (isErr ? 'err' : 'ok');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display='none', 3000);
}

load();
</script>
</body>
</html>
